<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Anniversary</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2vmin;
      padding: 2vmin;
      box-sizing: border-box;
      background:
        radial-gradient(ellipse 90% 70% at 50% 50%, #0c0c0c 0%, #050505 55%, #000 100%);
      overflow: hidden;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: opacity 0.4s ease;
      container-type: size;
      min-width: 0;
      min-height: 0;
    }
    .cell:hover .app-icon {
      transform: scale(1.04);
    }
    .app-icon {
      transition: transform 0.4s ease;
    }

    /* fullscreen mode: clicked cell takes the whole viewport */
    .stage.zoomed .cell { opacity: 0; pointer-events: none; }
    .stage.zoomed .cell.active {
      opacity: 1;
      pointer-events: auto;
      position: fixed;
      inset: 0;
      z-index: 5;
      background: radial-gradient(ellipse 90% 70% at 50% 50%, #0c0c0c 0%, #050505 55%, #000 100%);
    }
    .stage.zoomed .cell.active .app-icon {
      width: 42vmin;
      box-shadow:
        0 0 60px rgba(30, 215, 96, 0.45),
        0 0 160px rgba(30, 215, 96, 0.3),
        0 30px 70px rgba(0, 0, 0, 0.65),
        0 8px 24px rgba(0, 0, 0, 0.5),
        inset 0 2px 0 rgba(255, 255, 255, 0.06);
    }
    .stage.zoomed .cell.active .halo {
      width: 80vmin;
      filter: blur(40px);
    }

    .close-btn {
      position: fixed;
      top: 2.5vmin;
      right: 2.5vmin;
      width: 5vmin;
      height: 5vmin;
      min-width: 36px;
      min-height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      font-weight: 300;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      backdrop-filter: blur(8px);
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 1);
      transform: scale(1.05);
    }
    .stage.zoomed ~ .close-btn,
    body.mock-mode .close-btn { display: flex; }

    .iphone-btn {
      position: fixed;
      top: 2.5vmin;
      right: calc(2.5vmin + 5vmin + 1.5vmin);
      min-width: 36px;
      min-height: 36px;
      height: 5vmin;
      padding: 0 1.6vmin;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 0.6em;
      z-index: 20;
      backdrop-filter: blur(8px);
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }
    .iphone-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      transform: scale(1.03);
    }
    .stage.zoomed ~ .iphone-btn { display: inline-flex; }
    body.mock-mode .iphone-btn { display: none; }

    /* iPhone mock view */
    .phone-mock {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: radial-gradient(ellipse at center, #0a0a0a 0%, #000 80%);
      z-index: 15;
      padding: 4vmin;
      box-sizing: border-box;
    }
    body.mock-mode .phone-mock { display: grid; }

    .phone {
      position: relative;
      height: min(90vh, 88vmin * 2.05);
      aspect-ratio: 1 / 2.05;
      background: linear-gradient(160deg, #1a1a1c 0%, #0a0a0c 100%);
      border-radius: 7%;
      padding: 1.2%;
      box-shadow:
        0 0 0 2px #2a2a2c,
        0 40px 80px rgba(0, 0, 0, 0.7),
        0 0 120px rgba(30, 215, 96, 0.12);
    }
    .phone::before {
      /* side button hint */
      content: '';
      position: absolute;
      left: -0.6%;
      top: 18%;
      width: 0.6%;
      height: 8%;
      background: #1a1a1c;
      border-radius: 2px 0 0 2px;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 6%;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(255, 70, 130, 0.25), transparent 55%),
        radial-gradient(ellipse at 75% 80%, rgba(120, 0, 200, 0.35), transparent 60%),
        radial-gradient(ellipse at 50% 50%, rgba(30, 215, 96, 0.12), transparent 65%),
        linear-gradient(160deg, #1a0010 0%, #1a0030 50%, #0a0220 100%);
      display: flex;
      flex-direction: column;
    }

    .dynamic-island {
      position: absolute;
      top: 1.6%;
      left: 50%;
      transform: translateX(-50%);
      width: 30%;
      height: 3.4%;
      background: #000;
      border-radius: 999px;
      z-index: 5;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.6% 8% 0;
      height: 5.5%;
      font-size: clamp(8px, 1.4cqh, 13px);
      color: #fff;
      font-weight: 600;
      flex-shrink: 0;
    }
    .status-icons {
      display: flex;
      gap: 0.35em;
      align-items: center;
      font-size: 0.85em;
      opacity: 0.95;
    }

    .app-grid-ios {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: min-content;
      gap: 5% 6%;
      padding: 6% 7% 2%;
      align-content: start;
    }

    .ios-app {
      display: block;
    }
    .ios-icon {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 22.5%;
      box-shadow:
        0 4px 10px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    /* placeholder colors — just blocks, rotated for variety */
    .ph-1 { background: linear-gradient(160deg, #3a3a3d, #1c1c1e); }
    .ph-2 { background: linear-gradient(160deg, #4a4a4f, #2a2a2e); }
    .ph-3 { background: linear-gradient(160deg, #2c2c2e, #141416); }
    .ph-4 { background: linear-gradient(160deg, #5a5a5f, #2a2a2e); }
    .ph-5 { background: linear-gradient(160deg, #3a3a3d, #1c1c1e); }
    .ph-6 { background: linear-gradient(160deg, #4a4a4f, #1c1c1e); }

    .ios-spotify-slot {
      background: #000;
      padding: 0;
      container-type: size;
    }
    .ios-spotify-slot:not(.variant-anniversary) > svg {
      width: 72%;
      height: 72%;
    }
    .ios-spotify-slot.variant-anniversary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3%;
      padding: 0 8%;
      box-sizing: border-box;
    }

    .dock {
      margin: 0 5% 5%;
      padding: 4%;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(20px);
      border-radius: 12%/22%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4%;
      flex-shrink: 0;
    }

    .home-indicator {
      position: absolute;
      bottom: 1%;
      left: 50%;
      transform: translateX(-50%);
      width: 35%;
      height: 0.5%;
      background: #fff;
      border-radius: 999px;
    }

    /* one soft green halo behind each icon — barely there */
    .halo {
      position: absolute;
      top: 50%; left: 50%;
      width: min(80cqw, 80cqh);
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30, 215, 96, 0.12) 0%, transparent 60%);
      filter: blur(20px);
      animation: breathe 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.08); }
    }

    .grain {
      position: fixed; inset: 0; pointer-events: none; opacity: 0.05;
      background-image:
        radial-gradient(rgba(255,255,255,0.6) 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,0.3) 1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      mix-blend-mode: overlay;
      z-index: 10;
    }

    .vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.85) 100%);
      z-index: 10;
    }

    /* iOS app icon container — black squircle holding the green Spotify circle */
    .app-icon {
      position: relative;
      width: min(75cqw, 75cqh);
      aspect-ratio: 1 / 1;
      border-radius: 22.5%;
      background: #000;
      box-shadow:
        0 0 30px rgba(30, 215, 96, 0.35),
        0 0 80px rgba(30, 215, 96, 0.2),
        0 15px 35px rgba(0, 0, 0, 0.65),
        0 4px 12px rgba(0, 0, 0, 0.5),
        inset 0 2px 0 rgba(255, 255, 255, 0.06);
      animation: pulse 4s ease-in-out infinite;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    /* hairline iOS-style border */
    .app-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      z-index: 2;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow:
          0 0 30px rgba(30, 215, 96, 0.35),
          0 0 80px rgba(30, 215, 96, 0.2),
          0 15px 35px rgba(0, 0, 0, 0.65),
          0 4px 12px rgba(0, 0, 0, 0.5),
          inset 0 2px 0 rgba(255, 255, 255, 0.06);
      }
      50% {
        box-shadow:
          0 0 50px rgba(30, 215, 96, 0.55),
          0 0 110px rgba(30, 215, 96, 0.32),
          0 15px 35px rgba(0, 0, 0, 0.65),
          0 4px 12px rgba(0, 0, 0, 0.5),
          inset 0 2px 0 rgba(255, 255, 255, 0.08);
      }
    }

    .app-icon svg {
      width: 72%;
      height: 72%;
      display: block;
      position: relative;
      z-index: 0;
    }

    /* === Variant: 20th Anniversary — metallic emerald "20" === */
    .variant-anniversary .app-icon {
      width: min(75cqw, 75cqh);
      aspect-ratio: 1 / 1;
      border-radius: 22.5%;
      container-type: size;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3%;
      padding: 0 8%;
      box-sizing: border-box;
      box-shadow:
        0 0 30px rgba(46, 230, 110, 0.35),
        0 0 100px rgba(46, 230, 110, 0.22),
        0 15px 35px rgba(0, 0, 0, 0.7),
        0 4px 12px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: pulse-emerald 4s ease-in-out infinite;
    }

    @keyframes pulse-emerald {
      0%, 100% {
        box-shadow:
          0 0 30px rgba(46, 230, 110, 0.35),
          0 0 100px rgba(46, 230, 110, 0.22),
          0 15px 35px rgba(0, 0, 0, 0.7),
          0 4px 12px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      50% {
        box-shadow:
          0 0 55px rgba(46, 230, 110, 0.55),
          0 0 140px rgba(46, 230, 110, 0.35),
          0 15px 35px rgba(0, 0, 0, 0.7),
          0 4px 12px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
    }

    .variant-anniversary .anniv-digit {
      font-family: 'Helvetica Neue', 'Inter', -apple-system, sans-serif;
      font-weight: 800;
      font-style: italic;
      font-size: 54cqh;
      line-height: 1;
      letter-spacing: -0.02em;
      padding: 0 0.1em 0 0;
      background:
        linear-gradient(180deg,
          #eaffe9 0%,
          #6df0a3 10%,
          #1bc05a 28%,
          #0a5a26 48%,
          #2ce370 60%,
          #1ed760 75%,
          #04361a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter:
        drop-shadow(0 1px 0 rgba(255, 255, 255, 0.25))
        drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5))
        drop-shadow(0 0 6px rgba(46, 230, 110, 0.35));
      transform: translateY(-3%);
      user-select: none;
    }

    .variant-anniversary .app-icon svg,
    .ios-spotify-slot.variant-anniversary > svg {
      width: auto;
      height: 44cqh;
      aspect-ratio: 1 / 1;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px rgba(46, 230, 110, 0.5));
    }

    /* === Variant: 20th Anniversary — emit (digits "20" + OG bars above the "0") === */
    .variant-anniversary-emit .anniv-digit {
      font-size: 64cqh;
      padding: 0;
    }
    .variant-anniversary-emit .emit-zero-wrap {
      position: relative;
      display: inline-block;
    }
    .variant-anniversary-emit .app-icon svg,
    .ios-spotify-slot.variant-anniversary-emit > svg {
      position: absolute;
      bottom: 75%;
      left: 50%;
      transform: translateX(-50%);
      width: 38cqh;
      height: 23cqh;
      aspect-ratio: auto;
    }

    /* === Variant: Shrek — Spotify logo with Shrek ears === */
    .variant-shrek .app-icon svg {
      overflow: visible;
    }

    /* === Variant: 20th Anniversary — bleed (oversized Spotify orb leaking past the squircle) === */
    .variant-anniversary-bleed .app-icon,
    .ios-spotify-slot.variant-anniversary-bleed {
      justify-content: flex-start;
      padding-left: 14%;
      padding-right: 0;
      overflow: hidden;
      clip-path: inset(0 round 22.5%);
      isolation: isolate;
    }
    .variant-anniversary-bleed .anniv-digit {
      font-size: 72cqh;
      position: relative;
      z-index: 2;
    }
    .variant-anniversary-bleed .app-icon svg,
    .ios-spotify-slot.variant-anniversary-bleed > svg {
      position: absolute;
      right: -55%;
      top: 50%;
      left: auto;
      transform: translateY(-50%);
      width: 95cqh;
      height: 95cqh;
      aspect-ratio: 1 / 1;
      flex-shrink: 0;
      filter: drop-shadow(0 0 14px rgba(46, 230, 110, 0.55));
    }
  </style>
</head>

        <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg" aria-label="Spotify 20 bleed">
          <defs>
            <linearGradient id="emerald-bleed" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%"  stop-color="#eaffe9"/>
              <stop offset="10%" stop-color="#6df0a3"/>
              <stop offset="28%" stop-color="#1bc05a"/>
              <stop offset="48%" stop-color="#0a5a26"/>

  <script>
    (() => {
      const stage = document.querySelector('.stage');
      const cells = document.querySelectorAll('.cell');
      const closeBtn = document.querySelector('.close-btn');
      const iphoneBtn = document.querySelector('.iphone-btn');
      const spotifySlot = document.querySelector('.ios-spotify-slot');

      function zoom(cell) {
        cells.forEach(c => c.classList.remove('active'));
        cell.classList.add('active');
        stage.classList.add('zoomed');
      }

      function enterMock() {
        const active = document.querySelector('.cell.active');
        if (!active) return;
        const sourceIcon = active.querySelector('.app-icon');
        if (sourceIcon) {
          spotifySlot.innerHTML = sourceIcon.innerHTML;
          ['variant-anniversary', 'variant-anniversary-emit', 'variant-anniversary-bleed'].forEach(cls => {
            spotifySlot.classList.toggle(cls, active.classList.contains(cls));
          });
        }
        document.body.classList.add('mock-mode');
      }

      function exit() {
        if (document.body.classList.contains('mock-mode')) {
          document.body.classList.remove('mock-mode');
          return;
        }
        stage.classList.remove('zoomed');
        cells.forEach(c => c.classList.remove('active'));
      }

      cells.forEach(cell => {
        cell.addEventListener('click', () => {
          if (!stage.classList.contains('zoomed')) zoom(cell);
        });
      });

      iphoneBtn.addEventListener('click', enterMock);
      closeBtn.addEventListener('click', exit);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') exit();
      });
    })();
  </script>
