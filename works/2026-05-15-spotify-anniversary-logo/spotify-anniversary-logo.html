<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Anniversary</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(ellipse 90% 70% at 50% 50%, #0c0c0c 0%, #050505 55%, #000 100%);
      overflow: hidden;
    }

    /* one soft green halo behind the icon — barely there */
    .halo {
      position: absolute;
      top: 50%; left: 50%;
      width: 80vmin;
      height: 80vmin;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30, 215, 96, 0.10) 0%, transparent 60%);
      filter: blur(40px);
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.08); }
    }

    .grain {
      position: fixed; inset: 0; pointer-events: none; opacity: 0.05;
      background-image:
        radial-gradient(rgba(255,255,255,0.6) 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,0.3) 1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      mix-blend-mode: overlay;
    }

    .vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.85) 100%);
    }

    /* iOS app icon container — black squircle holding the green Spotify circle */
    .app-icon {
      position: relative;
      width: 42vmin;
      height: 42vmin;
      border-radius: 22.5%;
      background: #000;
      box-shadow:
        0 0 60px rgba(30, 215, 96, 0.45),
        0 0 160px rgba(30, 215, 96, 0.3),
        0 30px 70px rgba(0, 0, 0, 0.65),
        0 8px 24px rgba(0, 0, 0, 0.5),
        inset 0 2px 0 rgba(255, 255, 255, 0.06);
      animation: pulse 4s ease-in-out infinite;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    /* hairline iOS-style border */
    .app-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      z-index: 2;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow:
          0 0 60px rgba(30, 215, 96, 0.45),
          0 0 160px rgba(30, 215, 96, 0.3),
          0 30px 70px rgba(0, 0, 0, 0.65),
          0 8px 24px rgba(0, 0, 0, 0.5),
          inset 0 2px 0 rgba(255, 255, 255, 0.06);
      }
      50% {
        box-shadow:
          0 0 100px rgba(30, 215, 96, 0.7),
          0 0 220px rgba(30, 215, 96, 0.45),
          0 30px 70px rgba(0, 0, 0, 0.65),
          0 8px 24px rgba(0, 0, 0, 0.5),
          inset 0 2px 0 rgba(255, 255, 255, 0.08);
      }
    }

    .app-icon svg {
      width: 72%;
      height: 72%;
      display: block;
      position: relative;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="halo"></div>

    <div class="app-icon">
      <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg" aria-label="Spotify">
        <circle cx="84" cy="84" r="84" fill="#1ED760"/>
        <path fill="#000000" d="M119.6 117.2c-1.5 2.5-4.7 3.2-7.2 1.7-19.7-12-44.4-14.7-73.6-8-2.8.6-5.6-1.1-6.3-3.9-.6-2.8 1.1-5.6 3.9-6.3 31.9-7.3 59.3-4.2 81.4 9.3 2.5 1.5 3.3 4.7 1.8 7.2zm9.5-21.2c-1.9 3.1-5.9 4-9 2.1-22.5-13.8-56.8-17.8-83.4-9.7-3.5 1.1-7.2-.9-8.3-4.4-1.1-3.5.9-7.2 4.4-8.3 30.4-9.2 68.2-4.8 94 11 3.1 1.9 4 5.9 2.3 9.3zm.8-22.1C103 58.5 57.6 56.8 32.3 64.5c-4.2 1.3-8.6-1.1-9.9-5.3-1.3-4.2 1.1-8.6 5.3-9.9 29-8.8 79.2-7.1 110.4 11.4 3.8 2.2 5 7.1 2.8 10.8-2.2 3.8-7.1 5-10.9 2.8z"/>
      </svg>
    </div>
  </div>

  <div class="grain"></div>
  <div class="vignette"></div>
</body>
</html>
